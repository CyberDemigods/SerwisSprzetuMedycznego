<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="650" cy="100" r="120" fill="#0e7490" opacity="0.04"/>
  <circle cx="150" cy="350" r="100" fill="#10b981" opacity="0.04"/>
  <!-- Shield -->
  <path d="M400,60 L500,110 L500,240 Q500,320 400,370 Q300,320 300,240 L300,110 Z" fill="url(#shield-grad)" opacity="0.1" stroke="#0e7490" stroke-width="3"/>
  <path d="M400,85 L480,125 L480,235 Q480,300 400,345 Q320,300 320,235 L320,125 Z" fill="white" opacity="0.6"/>
  <!-- Lightning bolt (electrical safety) -->
  <g transform="translate(400, 200)">
    <polygon points="5,-70 -20,0 5,0 -5,70 30,0 5,0" fill="#0e7490"/>
  </g>
  <!-- Checkmark in shield -->
  <circle cx="400" cy="310" r="18" fill="#10b981" opacity="0.2"/>
  <path d="M390,310 l7,7 14-14" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Testing probes left side -->
  <g transform="translate(150, 160)">
    <!-- Probe body -->
    <rect x="-6" y="0" width="12" height="80" rx="4" fill="#1e3a5f"/>
    <rect x="-4" y="80" width="8" height="40" rx="2" fill="#0e7490"/>
    <!-- Probe tip -->
    <circle cx="0" cy="125" r="4" fill="#0e7490"/>
    <!-- Wire -->
    <path d="M0,0 Q-40,-30 -60,-20 Q-80,-10 -80,20" stroke="#1e3a5f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Testing probes right side -->
  <g transform="translate(650, 160)">
    <rect x="-6" y="0" width="12" height="80" rx="4" fill="#1e3a5f"/>
    <rect x="-4" y="80" width="8" height="40" rx="2" fill="#10b981"/>
    <circle cx="0" cy="125" r="4" fill="#10b981"/>
    <path d="M0,0 Q40,-30 60,-20 Q80,-10 80,20" stroke="#1e3a5f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Circular compliance badge -->
  <circle cx="180" cy="300" r="35" fill="none" stroke="#0e7490" stroke-width="2.5" opacity="0.4"/>
  <circle cx="180" cy="300" r="28" fill="none" stroke="#0e7490" stroke-width="1.5" opacity="0.3"/>
  <path d="M170,300 l7,7 14-14" stroke="#0e7490" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Circuit pattern decoration -->
  <g opacity="0.12" stroke="#0e7490" stroke-width="1.5" fill="none">
    <line x1="600" y1="320" x2="700" y2="320"/>
    <line x1="700" y1="320" x2="700" y2="360"/>
    <circle cx="700" cy="360" r="3" fill="#0e7490"/>
    <line x1="620" y1="320" x2="620" y2="350"/>
    <circle cx="620" cy="350" r="3" fill="#0e7490"/>
    <line x1="660" y1="320" x2="660" y2="380"/>
    <circle cx="660" cy="380" r="3" fill="#0e7490"/>
  </g>
</svg>