<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="680" cy="90" r="110" fill="#10b981" opacity="0.05"/>
  <circle cx="100" cy="370" r="80" fill="#0e7490" opacity="0.05"/>
  <!-- Document/Certificate -->
  <rect x="300" y="90" width="200" height="270" rx="8" fill="white" stroke="#1e3a5f" stroke-width="3"/>
  <!-- Certificate header decoration -->
  <rect x="320" y="110" width="160" height="4" rx="2" fill="#0e7490"/>
  <rect x="350" y="122" width="100" height="4" rx="2" fill="#0e7490" opacity="0.3"/>
  <!-- Certificate content lines -->
  <rect x="330" y="150" width="140" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="330" y="168" width="120" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="330" y="186" width="140" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="330" y="204" width="100" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="330" y="222" width="130" height="5" rx="2.5" fill="#cbd5e1"/>
  <!-- Certificate stamp/seal -->
  <circle cx="400" cy="300" r="28" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="400" cy="300" r="20" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <path d="M392 300l5 5 11-11" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Magnifying glass -->
  <g transform="translate(220, 180)">
    <circle cx="0" cy="0" r="70" fill="white" fill-opacity="0.4" stroke="#0e7490" stroke-width="4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#0e7490" stroke-width="1.5" opacity="0.3"/>
    <!-- Glass shine -->
    <path d="M-30,-40 Q-15,-50 0,-40" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Handle -->
    <line x1="50" y1="50" x2="100" y2="100" stroke="#1e3a5f" stroke-width="10" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="100" y2="100" stroke="#0e7490" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Stars/rating -->
  <g transform="translate(560, 170)">
    <polygon points="0,-18 5,-6 18,-6 8,3 11,16 0,9 -11,16 -8,3 -18,-6 -5,-6" fill="#10b981" opacity="0.8"/>
  </g>
  <g transform="translate(600, 170)">
    <polygon points="0,-18 5,-6 18,-6 8,3 11,16 0,9 -11,16 -8,3 -18,-6 -5,-6" fill="#10b981" opacity="0.8"/>
  </g>
  <g transform="translate(640, 170)">
    <polygon points="0,-18 5,-6 18,-6 8,3 11,16 0,9 -11,16 -8,3 -18,-6 -5,-6" fill="#10b981" opacity="0.8"/>
  </g>
  <g transform="translate(680, 170)">
    <polygon points="0,-18 5,-6 18,-6 8,3 11,16 0,9 -11,16 -8,3 -18,-6 -5,-6" fill="#0e7490" opacity="0.15"/>
  </g>
  <!-- Checklist items beside document -->
  <g transform="translate(560, 220)">
    <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.2"/>
    <path d="M-4,0l3,3 6-6" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="16" y="-3" width="80" height="6" rx="3" fill="#cbd5e1"/>
  </g>
  <g transform="translate(560, 255)">
    <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.2"/>
    <path d="M-4,0l3,3 6-6" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="16" y="-3" width="100" height="6" rx="3" fill="#cbd5e1"/>
  </g>
  <g transform="translate(560, 290)">
    <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.2"/>
    <path d="M-4,0l3,3 6-6" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="16" y="-3" width="70" height="6" rx="3" fill="#cbd5e1"/>
  </g>
</svg>