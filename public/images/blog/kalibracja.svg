<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="680" cy="90" r="110" fill="#0e7490" opacity="0.04"/>
  <circle cx="120" cy="370" r="80" fill="#10b981" opacity="0.04"/>
  <!-- Main gauge/dial -->
  <circle cx="400" cy="230" r="150" fill="white" stroke="#1e3a5f" stroke-width="4"/>
  <circle cx="400" cy="230" r="140" fill="none" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Gauge scale arc -->
  <path d="M275,310 A150,150 0 0,1 525,310" fill="none" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
  <!-- Color zones on gauge -->
  <path d="M275,310 A150,150 0 0,1 290,270" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M290,270 A150,150 0 0,1 340,170" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M340,170 A150,150 0 0,1 460,170" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M460,170 A150,150 0 0,1 510,270" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M510,270 A150,150 0 0,1 525,310" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Tick marks -->
  <line x1="400" y1="95" x2="400" y2="110" stroke="#1e3a5f" stroke-width="3"/>
  <line x1="290" y1="130" x2="300" y2="142" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="510" y1="130" x2="500" y2="142" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="260" y1="230" x2="275" y2="230" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="540" y1="230" x2="525" y2="230" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="280" y1="320" x2="292" y2="312" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="520" y1="320" x2="508" y2="312" stroke="#1e3a5f" stroke-width="2"/>
  <!-- Minor ticks -->
  <line x1="340" y1="103" x2="345" y2="116" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="460" y1="103" x2="455" y2="116" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="270" y1="175" x2="282" y2="183" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="530" y1="175" x2="518" y2="183" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Needle pointing to optimal -->
  <g transform="translate(400, 230)">
    <polygon points="0,-110 -5,10 5,10" fill="#0e7490"/>
    <circle cx="0" cy="0" r="12" fill="#1e3a5f"/>
    <circle cx="0" cy="0" r="6" fill="#0e7490"/>
  </g>
  <!-- Precision crosshair markers -->
  <g transform="translate(160, 150)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#0e7490" stroke-width="1.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#0e7490" stroke-width="1.5"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#0e7490" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#0e7490"/>
  </g>
  <g transform="translate(640, 160)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#0e7490" stroke-width="1.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#0e7490" stroke-width="1.5"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#0e7490" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#0e7490"/>
  </g>
  <!-- Small accuracy badge -->
  <g transform="translate(640, 330)">
    <circle cx="0" cy="0" r="22" fill="#10b981" opacity="0.15"/>
    <path d="M-7,0 l5,5 10-10" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>