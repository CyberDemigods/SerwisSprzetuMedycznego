<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#0e7490" opacity="0.05"/>
  <circle cx="150" cy="380" r="80" fill="#10b981" opacity="0.05"/>
  <!-- Clipboard body -->
  <rect x="260" y="80" width="180" height="240" rx="12" fill="white" stroke="#1e3a5f" stroke-width="3"/>
  <!-- Clipboard clip -->
  <rect x="310" y="68" width="80" height="30" rx="6" fill="#1e3a5f"/>
  <circle cx="350" cy="78" r="6" fill="#f1f5f9"/>
  <!-- Checklist lines -->
  <rect x="290" y="130" width="14" height="14" rx="3" fill="none" stroke="#0e7490" stroke-width="2"/>
  <path d="M293 137l4 4 7-8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="315" y="134" width="100" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="290" y="165" width="14" height="14" rx="3" fill="none" stroke="#0e7490" stroke-width="2"/>
  <path d="M293 172l4 4 7-8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="315" y="169" width="80" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="290" y="200" width="14" height="14" rx="3" fill="none" stroke="#0e7490" stroke-width="2"/>
  <path d="M293 207l4 4 7-8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="315" y="204" width="90" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="290" y="235" width="14" height="14" rx="3" fill="none" stroke="#0e7490" stroke-width="2"/>
  <rect x="315" y="239" width="70" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="290" y="270" width="14" height="14" rx="3" fill="none" stroke="#0e7490" stroke-width="2"/>
  <rect x="315" y="274" width="95" height="6" rx="3" fill="#cbd5e1"/>
  <!-- Medical device (monitor) -->
  <rect x="490" y="140" width="160" height="120" rx="10" fill="white" stroke="#1e3a5f" stroke-width="3"/>
  <rect x="502" y="152" width="136" height="80" rx="4" fill="#0e7490" opacity="0.1"/>
  <!-- Heartbeat line on screen -->
  <polyline points="510,195 530,195 540,175 550,215 560,185 570,195 590,195 600,180 610,210 620,190 630,195" stroke="#0e7490" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Monitor stand -->
  <rect x="555" y="260" width="30" height="20" rx="2" fill="#1e3a5f"/>
  <rect x="540" y="278" width="60" height="6" rx="3" fill="#1e3a5f"/>
  <!-- Small indicator dots -->
  <circle cx="515" cy="245" r="4" fill="#10b981"/>
  <circle cx="530" cy="245" r="4" fill="#0e7490" opacity="0.4"/>
  <circle cx="545" cy="245" r="4" fill="#0e7490" opacity="0.4"/>
  <!-- Calendar/clock symbol -->
  <circle cx="170" cy="170" r="50" fill="white" stroke="#0e7490" stroke-width="3"/>
  <line x1="170" y1="170" x2="170" y2="140" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="170" x2="195" y2="175" stroke="#0e7490" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="170" cy="170" r="3" fill="#1e3a5f"/>
  <!-- Clock tick marks -->
  <line x1="170" y1="125" x2="170" y2="130" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="170" y1="210" x2="170" y2="215" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="125" y1="170" x2="130" y2="170" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="210" y1="170" x2="215" y2="170" stroke="#1e3a5f" stroke-width="2"/>
</svg>