<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="650" cy="100" r="120" fill="#0e7490" opacity="0.04"/>
  <circle cx="150" cy="370" r="100" fill="#10b981" opacity="0.04"/>
  <!-- Main shield -->
  <path d="M400,50 L530,110 L530,240 Q530,350 400,400 Q270,350 270,240 L270,110 Z" fill="url(#shield-fill)" stroke="#0e7490" stroke-width="3.5"/>
  <path d="M400,75 L510,125 L510,235 Q510,330 400,375 Q290,330 290,235 L290,125 Z" fill="white" opacity="0.5"/>
  <!-- Lightning bolt inside shield -->
  <g transform="translate(400, 210)">
    <polygon points="10,-80 -25,-5 8,-5 -10,80 35,5 0,5" fill="#0e7490"/>
    <!-- Inner highlight -->
    <polygon points="8,-65 -15,-5 5,-5 -5,60 25,5 5,5" fill="#0e7490" opacity="0.5"/>
  </g>
  <!-- Electric arcs/sparks left -->
  <g transform="translate(230, 180)" opacity="0.4">
    <path d="M0,0 L-15,-10 L-8,-12 L-25,-25" stroke="#0e7490" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-5,10 L-20,5 L-15,0 L-30,-8" stroke="#0e7490" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Electric arcs/sparks right -->
  <g transform="translate(570, 180)" opacity="0.4">
    <path d="M0,0 L15,-10 L8,-12 L25,-25" stroke="#0e7490" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M5,10 L20,5 L15,0 L30,-8" stroke="#0e7490" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Ground symbol -->
  <g transform="translate(160, 240)">
    <line x1="0" y1="-20" x2="0" y2="0" stroke="#1e3a5f" stroke-width="3"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#1e3a5f" stroke-width="3"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="#1e3a5f" stroke-width="3"/>
    <line x1="-8" y1="16" x2="8" y2="16" stroke="#1e3a5f" stroke-width="3"/>
  </g>
  <!-- Plug/outlet symbol -->
  <g transform="translate(640, 240)">
    <circle cx="0" cy="0" r="28" fill="white" stroke="#1e3a5f" stroke-width="2.5"/>
    <circle cx="-10" cy="-8" r="3.5" fill="#1e3a5f"/>
    <circle cx="10" cy="-8" r="3.5" fill="#1e3a5f"/>
    <circle cx="0" cy="10" r="4" fill="none" stroke="#1e3a5f" stroke-width="2"/>
  </g>
  <!-- Safety checkmark badge -->
  <g transform="translate(400, 370)">
    <circle cx="0" cy="0" r="16" fill="#10b981" opacity="0.2"/>
    <path d="M-6,0 l4,4 9-9" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Circuit lines decoration -->
  <g opacity="0.1" stroke="#1e3a5f" stroke-width="1.5">
    <line x1="100" y1="100" x2="200" y2="100"/>
    <line x1="200" y1="100" x2="200" y2="140"/>
    <circle cx="200" cy="140" r="3" fill="#1e3a5f"/>
    <line x1="600" y1="350" x2="700" y2="350"/>
    <line x1="700" y1="350" x2="700" y2="380"/>
    <circle cx="700" cy="380" r="3" fill="#1e3a5f"/>
    <line x1="130" y1="100" x2="130" y2="130"/>
    <circle cx="130" cy="130" r="3" fill="#1e3a5f"/>
  </g>
</svg>