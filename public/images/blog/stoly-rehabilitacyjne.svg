<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="680" cy="100" r="100" fill="#0e7490" opacity="0.05"/>
  <circle cx="120" cy="360" r="90" fill="#10b981" opacity="0.05"/>
  <!-- Rehabilitation table -->
  <!-- Table surface -->
  <rect x="180" y="180" width="350" height="20" rx="4" fill="white" stroke="#1e3a5f" stroke-width="3"/>
  <!-- Adjustable head section (angled) -->
  <g transform="rotate(-20, 180, 190)">
    <rect x="90" y="180" width="100" height="20" rx="4" fill="white" stroke="#1e3a5f" stroke-width="3"/>
  </g>
  <!-- Padding/cushion -->
  <rect x="195" y="175" width="320" height="8" rx="4" fill="#0e7490" opacity="0.2"/>
  <!-- Table legs -->
  <rect x="220" y="200" width="8" height="100" rx="2" fill="#1e3a5f"/>
  <rect x="490" y="200" width="8" height="100" rx="2" fill="#1e3a5f"/>
  <!-- Base frame -->
  <rect x="200" y="295" width="120" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="400" y="295" width="120" height="8" rx="4" fill="#1e3a5f"/>
  <!-- Actuator/mechanism -->
  <rect x="340" y="210" width="40" height="70" rx="4" fill="#0e7490" opacity="0.15" stroke="#0e7490" stroke-width="2"/>
  <line x1="360" y1="220" x2="360" y2="270" stroke="#0e7490" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Up/down arrows on actuator -->
  <path d="M355 230l5-8 5 8" stroke="#0e7490" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M355 260l5 8 5-8" stroke="#0e7490" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Wrench -->
  <g transform="translate(580, 160) rotate(30)">
    <!-- Wrench handle -->
    <rect x="-8" y="0" width="16" height="100" rx="5" fill="#1e3a5f"/>
    <!-- Wrench head -->
    <path d="M-18,-5 L-18,-25 C-18,-40 -8,-50 0,-50 C8,-50 18,-40 18,-25 L18,-5 L10,-5 L10,-22 C10,-32 5,-38 0,-38 C-5,-38 -10,-32 -10,-22 L-10,-5 Z" fill="#1e3a5f"/>
    <!-- Wrench grip lines -->
    <line x1="-5" y1="60" x2="5" y2="60" stroke="#f1f5f9" stroke-width="1.5"/>
    <line x1="-5" y1="68" x2="5" y2="68" stroke="#f1f5f9" stroke-width="1.5"/>
    <line x1="-5" y1="76" x2="5" y2="76" stroke="#f1f5f9" stroke-width="1.5"/>
  </g>
  <!-- Warning/attention indicator -->
  <circle cx="350" cy="140" r="22" fill="#10b981" opacity="0.15"/>
  <g transform="translate(350, 140)">
    <path d="M0,-14 L12,10 L-12,10 Z" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="0" y1="-5" x2="0" y2="3" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="7" r="1.5" fill="#10b981"/>
  </g>
  <!-- Small gear -->
  <g transform="translate(650, 300)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#0e7490" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#0e7490" stroke-width="3" opacity="0.3"/>
    <line x1="0" y1="-20" x2="0" y2="-26" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="0" y1="20" x2="0" y2="26" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="-20" y1="0" x2="-26" y2="0" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="0" x2="26" y2="0" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="-14" y1="-14" x2="-18" y2="-18" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="14" y1="14" x2="18" y2="18" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="14" y1="-14" x2="18" y2="-18" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <line x1="-14" y1="14" x2="-18" y2="18" stroke="#0e7490" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>